<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <h2>Login</h2>
      <form id="loginForm">
        <input
          type="email"
          id="loginEmail"
          placeholder="Enter Email"
          required
        />
        <input
          type="password"
          id="loginPassword"
          placeholder="Enter Password"
          required
        />
        <button type="submit">Login</button>
      </form>
      <p>Don't have account? <a href="register.html">Register</a></p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
